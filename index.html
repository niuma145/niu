<style>
*{margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
.box{width:100%;height:100%;}
.load{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99;}

<body>
<div class="load" id="mask"></div>
<iframe class="box" id="ifr" sandbox="allow-scripts allow-forms allow-popups"></iframe>

<script>
//中转加载，完美解决https嵌套http报错，github pages专用
let url = btoa('http://a.u9c.cn/6qyDll');
document.getElementById('ifr').src='https://www.toolnb.com/tools/getUrl.html?url='+url;

//加载成功隐藏黑屏，失败一直遮罩完全看不见报错链接
document.getElementById('ifr').onload=()=>mask.style.display='none';
</script>
</body>
