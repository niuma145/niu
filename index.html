<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>牛马的爱心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:linear-gradient(135deg,#0a0a0a,#180810);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}
#go{
padding:18px 55px;
background:linear-gradient(45deg,#ff2d55,#ff5a92);
color:#fff;
border:none;
border-radius:50px;
font-size:19px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 0 25px rgba(255,45,85,0.4);
transition:all 0.2s ease;
}
#go:active{
transform:scale(0.95);
box-shadow:0 0 35px rgba(255,45,85,0.6);
}
</style>
</head>
<body>
<button id="go">点击后跳转领取地</button>

<script>
var url = "https://niuma145.github.io/fei/";

document.getElementById("go").onclick = function(){
window.location.href = url;
}
</script>
</body>
</html>
