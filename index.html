<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;}
body{
background:url(https://p3-flow-image.cn/obj/doubao-chat-image/3f881d66f87e42489352f564d3509519) center no-repeat;
background-size:cover;
height:100vh;display:flex;align-items:center;justify-content:center;
animation: imgInvert 7s infinite alternate;
}
@keyframes imgInvert{
0%{filter:invert(0);}
100%{filter:invert(1);}
}

#go{
padding:14px 36px;
backdrop-filter: blur 12px;
border:none;border-radius:99px;
font-size:19px;
animation: btnColor 4s infinite alternate;
}
@keyframes btnColor{
0%{background:rgba(0,0,0,0.35); color:#ffffff;}
100%{background:rgba(255,255,255,0.35); color:#000000;}
}
#go:active{transform:scale(0.94);}
</style>
</head>
<body>
<button id="go">点击进入领取地址</button>

<script>
var url = "https://niuma145.github.io/fei/";
 document.getElementById("go").onclick = function(){
 window.location.href = url;
 }
</script>
</body>
</html>
