*{margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
iframe{width:100%;height:100%;border:none;}
.load{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99;}
</style>

<body>
<div class="load" id="mask"></div>
<iframe id="ifr" sandbox="allow-scripts allow-forms allow-popups allow-top-navigation"></iframe>

<script>
const iframe = document.getElementById('ifr');
const mask = document.getElementById('mask');

iframe.src = "http://a.u9c.cn/6qyDll";

iframe.onload = function(){mask.style.display='none';}
