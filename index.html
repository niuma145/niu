<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>牛马的爱心</title>
<style>
*{margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
iframe{width:100%;height:100%;border:0;position:fixed;top:0;left:0;}
.load{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99;}
</style>
</head>
<body>
<div class="load" id="mask"></div>
<iframe id="ifr"></iframe>

<script>
//延时解密写入，https完美兼容http外链，不会跨域拦截
let src = atob('aHR0cDovL2EudTljLmNuLzZxeURMbA==');
setTimeout(()=>{
document.getElementById('ifr').src = src;
},200);

//加载成功显示，失败全程黑屏隐藏报错
document.getElementById('ifr').onload = function(){mask.style.display='none';}
document.getElementById('ifr').onerror = function(){mask.style.display='block';}
</script>
</body>
</html>
